<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Of News</title>

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: black;
  color: white;
  overflow: hidden;
}

/* بک گراند گرادیانت متحرک */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #000, #0f0, #111, #0f0);
  animation: moveBg 8s linear infinite;
  z-index: -2;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%,-25%); }
  100% { transform: translate(0,0); }
}

/* افکت ذرات */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* وسط چین */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* تیتر بالا */
.title {
  position: absolute;
  top: 30px;
  font-size: 25px;
  color: #0f0;
  text-shadow: 0 0 10px #0f0;
}

/* متن اصلی */
h1 {
  font-size: 55px;
  color: white;
  text-shadow: 
    0 0 10px #0f0,
    0 0 30px #0f0,
    0 0 60px #0f0;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #0f0; }
  to { text-shadow: 0 0 40px #0f0, 0 0 80px #0f0; }
}

/* دکمه */
.btn {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: 20px;
  background: #0f0;
  color: black;
  text-decoration: none;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 0 20px #0f0;
}

.btn:hover {
  background: white;
  transform: scale(1.1);
  box-shadow: 0 0 40px #0f0;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="title">چنل بزرگ کالاف نیوز</div>

<div class="container">
  <h1>🔥 CALL OF NEWS 🔥</h1>
  <a href="https://ble.ir/call_of_news_fa" class="btn">
    ورود به کانال
  </a>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 2
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#0f0";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();

    p.y += p.speed;
    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
