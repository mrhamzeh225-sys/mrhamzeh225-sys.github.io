<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST-HUNTER</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  color: white;
  text-align: center;

  /* بک گراند خفن بدون عکس 🔥 */
  background: linear-gradient(135deg, #000000, #00ff88, #00ccff);
  background-size: 400% 400%;
  animation: bgMove 10s infinite;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.overlay {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 40px;
  color: lime;
  text-shadow: 0 0 20px lime;
}

p {
  font-size: 20px;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: lime;
  color: black;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.btn:hover {
  background: cyan;
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="overlay">
  <h1>ساخته شده توسط ST-HUNTER</h1>
  <p>به سایت گیمینگ من خوش اومدی 😈🔥</p>

  <a href="#" class="btn">ورود</a>
</div>

</body>
</html>
