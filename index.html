<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ST-HUNTER</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: sans-serif;
}

/* متن اصلی */
h1 {
  font-size: 60px;
  color: red;
  text-align: center;
  text-shadow: 
    0 0 10px red,
    0 0 20px red,
    0 0 40px red;
  animation: glow 1.5s infinite alternate;
}

/* انیمیشن نور */
@keyframes glow {
  from {
    text-shadow: 
      0 0 10px red,
      0 0 20px red;
  }
  to {
    text-shadow: 
      0 0 20px red,
      0 0 40px red,
      0 0 80px red;
  }
}
</style>

</head>

<body>

<h1>امیر حسین خر منه</h1>

</body>
</html>
